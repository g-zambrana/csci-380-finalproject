<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/images/herb.svg" />
  <title>Reset Password — MindBloom</title>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-panel">

      <!-- Brand -->
      <div class="brand-top">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18">
            <path d="M12 22V12M12 12C12 7 7 4 3 6M12 12C12 7 17 4 21 6"/>
          </svg>
        </div>
        <div class="brand-copy">
          <h1 id="logoh1">MindBloom</h1>
          <p class="brand-sub">Reset your password and get back to your space.</p>
        </div>
      </div>

      <!-- Card -->
      <div class="form-box">
        <div class="auth-header">
          <h2>Reset your password</h2>
          <p class="auth-subtext">
            Enter your email and we’ll send you a reset link.
          </p>
        </div>

        <form id="resetPasswordForm">

          <div class="field-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <button class="submitButton" type="submit">
            Send reset email
          </button>

          <p id="forgotP">
            Remember your password?
            <a href="/login">Back to login</a>
          </p>

          <p id="message"></p>
        </form>
      </div>

    </div>
  </div>

  <script type="module" src="/js/reset-password.js"></script>
</body>
</html>

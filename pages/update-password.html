<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/auth.css" />
  <title>Update Password - MindBloom</title>
</head>
<body>
  <div class="container">
    <h1 id="logoh1">MindBloom</h1>

    <div class="form-box">
      <form id="updatePasswordForm">
        <h2>Choose New Password</h2>
        <p id="registerP">Enter your new password below.</p>

        <input id="password" type="password" placeholder="New password" required />
        <input id="confirmPassword" type="password" placeholder="Confirm new password" required />

        <button type="submit">Update Password</button>
        <p id="message"></p>
      </form>
    </div>
  </div>

  <script type="module" src="../js/update-password.js"></script>
</body>
</html>

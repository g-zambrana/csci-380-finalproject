<!DOCTYPE html>
<html lang="en">
<head>
        <link rel="icon" type="image/x-icon" href="/images/herb.svg">

  <meta charset="UTF-8">
  <title>Reflection</title>
    <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5efe7;
      display: flex;
      justify-content: center;
      margin-top: 80px;
    }

    .box {
      background: #e9dfd3;
      padding: 20px;
      border-radius: 8px;
      width: 500px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="box">
    <h3>Reflect on your day</h3>
    <p>What went well? Any challenges?</p>

    <textarea placeholder="Write here..."></textarea>

    <div class="buttons">
      <button>Previous Entries</button>
      <button>Submit</button>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/images/herb.svg" />
  <title>Login — MindBloom</title>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-panel">
      <div class="brand-top">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18">
            <path d="M12 22V12M12 12C12 7 7 4 3 6M12 12C12 7 17 4 21 6"/>
          </svg>
        </div>
        <div class="brand-copy">
          <h1 id="logoh1">MindBloom</h1>
          <p class="brand-sub">A calm place to check in, reflect, and grow.</p>
        </div>
      </div>

      <div class="form-box">
        <div class="auth-header">
          <h2>Welcome back</h2>
        </div>

        <form id="loginForm">
          <p id="registerP">
            New to MindBloom?
            <a href="/register">Sign up</a>
          </p>

          <div class="field-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="youremail@example.com" required />
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••••" required />
          </div>

          <button class="submitButton" type="submit">Sign in</button>

          <p id="forgotP">
            <a href="/reset-password">Forgot Password?</a>
          </p>

          <p id="message"></p>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/images/herb.svg" />
  <title>Register — MindBloom</title>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-panel">

      <div class="brand-top">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18">
            <path d="M12 22V12M12 12C12 7 7 4 3 6M12 12C12 7 17 4 21 6"/>
          </svg>
        </div>
        <div class="brand-copy">
          <h1 id="logoh1">MindBloom</h1>
          <p class="brand-sub">Create your account and begin your wellness journey.</p>
        </div>
      </div>

      <div class="form-box">
        <div class="auth-header">
          <h2>Create your account</h2>
          <p class="auth-subtext">Join MindBloom and start tracking, reflecting, and growing.</p>
        </div>

        <form id="registerForm">
          <p id="registerP">
            Already have an account?
            <a href="/login">Sign in</a>
          </p>

          <div class="field-group">
            <label for="fullName">Full Name</label>
            <input
              id="fullName"
              type="text"
              placeholder="Enter your full name"
            />
          </div>

          <div class="field-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Minimum 6 characters"
              required
            />
          </div>

          <button class="submitButton" type="submit">Create account</button>

          <p id="message"></p>
        </form>
      </div>

    </div>
  </div>

  <script type="module" src="/js/register.js"></script>
</body>
</html>
